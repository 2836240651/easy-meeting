<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试文件上传修复</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .test-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        .status {
            text-align: center;
            font-size: 18px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🔧 文件上传修复测试</h1>
    
    <div class="test-card">
        <h2>快速登录</h2>
        <div class="form-group">
            <label>邮箱:</label>
            <input type="email" id="email" value="test@qq.com">
        </div>
        <div class="form-group">
            <label>密码:</label>
            <input type="password" id="password" value="123456">
        </div>
        <button onclick="quickLogin()">登录</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div class="test-card">
        <h2>文件上传测试</h2>
        <div class="status" id="uploadStatus">请先登录</div>
        <div class="form-group">
            <label>选择图片文件:</label>
            <input type="file" id="fileInput" accept="image/*" disabled>
        </div>
        <button id="uploadBtn" onclick="testUpload()" disabled>上传测试</button>
        <div id="uploadResult" class="result"></div>
    </div>

    <script>
        let token = '';
        let uploadCount = 0;

        async function quickLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');
            
            resultDiv.innerHTML = '正在登录...';
            resultDiv.className = 'result info';
            
            try {
                const response = await fetch('/api/account/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&checkCode=1234`
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    token = result.data.token;
                    resultDiv.innerHTML = `✅ 登录成功！\n用户: ${result.data.nickName}\nToken: ${token.substring(0, 20)}...`;
                    resultDiv.className = 'result success';
                    
                    // 启用上传功能
                    document.getElementById('fileInput').disabled = false;
                    document.getElementById('uploadBtn').disabled = false;
                    document.getElementById('uploadStatus').innerHTML = '✅ 已登录，可以上传文件';
                    document.getElementById('uploadStatus').style.color = '#28a745';
                } else {
                    resultDiv.innerHTML = `❌ 登录失败: ${result.info}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ 登录错误: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testUpload() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('uploadResult');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '❌ 请选择文件';
                resultDiv.className = 'result error';
                return;
            }
            
            const file = fileInput.files[0];
            uploadCount++;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '上传中...';
            
            resultDiv.innerHTML = `🚀 第 ${uploadCount} 次上传测试\n文件: ${file.name}\n大小: ${(file.size / 1024).toFixed(2)} KB\n正在上传...`;
            resultDiv.className = 'result info';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const startTime = Date.now();
                const response = await fetch('/api/upload/avatar', {
                    method: 'POST',
                    headers: {
                        'token': token
                    },
                    body: formData
                });
                
                const endTime = Date.now();
                const result = await response.json();
                
                if (result.code === 200) {
                    resultDiv.innerHTML = `✅ 第 ${uploadCount} 次上传成功！\n` +
                        `文件: ${file.name}\n` +
                        `大小: ${(file.size / 1024).toFixed(2)} KB\n` +
                        `耗时: ${endTime - startTime}ms\n` +
                        `MinIO URL: ${result.data}\n\n` +
                        `🎉 临时文件清理应该正常，无错误日志`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = `❌ 第 ${uploadCount} 次上传失败: ${result.info}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ 第 ${uploadCount} 次上传错误: ${error.message}`;
                resultDiv.className = 'result error';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '上传测试';
            }
        }

        // 页面加载完成提示
        window.onload = function() {
            console.log('🔧 文件上传修复测试页面已加载');
            console.log('修复内容:');
            console.log('1. 确保 InputStream 正确关闭');
            console.log('2. 添加文件上传配置优化');
            console.log('3. 使用专用临时目录');
        };
    </script>
</body>
</html>
