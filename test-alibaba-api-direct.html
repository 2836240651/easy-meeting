<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>阿里百炼API直接测试</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; white-space: pre-wrap; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <h1>阿里百炼API测试</h1>
    
    <button onclick="testAPI()">测试API</button>
    <button onclick="testViaBackend()">通过后端测试</button>
    
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result';
            resultDiv.textContent = '正在测试...';
            
            try {
                const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-380e127757cb4031b4cf97962e74057b'
                    },
                    body: JSON.stringify({
                        model: 'qwen-plus',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: '你好' }
                        ]
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = '响应:\n' + JSON.stringify(data, null, 2);
                
                if (!response.ok) {
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '错误: ' + error.message + '\n\n注意: 浏览器直接调用可能因CORS限制失败,这是正常的。请使用"通过后端测试"按钮。';
            }
        }
        
        async function testViaBackend() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result';
            resultDiv.textContent = '正在通过后端测试...';
            
            try {
                const response = await fetch('http://localhost:6099/api/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        meetingId: 'test',
                        message: '你好'
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = '后端响应:\n' + JSON.stringify(data, null, 2);
                
                if (data.code !== 200) {
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
