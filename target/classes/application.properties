# 应用服务 WEB 访问端口
server.port=6099
ws.port=6098
server.servlet.context-path=/api
#session过期时间 60M 一个小时
server.servlet.session.timeout=PT60M
#处理favicon
spring.mvc.favicon.enable=false
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
# -multipart location
spring.servlet.multipart.location=${java.io.tmpdir}
# 
spring.servlet.multipart.resolve-lazily=false
# 错误页处理
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
# 数据库配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/easymeeting?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=HikariCPDatasource
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.connection-timeout=30000

# - 新配置 - 
spring.datasource.hikari.connection-test-query=SELECT 1
#Spring redis配置
# Redis数据库索引（默认为0）
spring.redis.database=0
spring.redis.host=127.0.0.1
spring.redis.port=6379
# 连接池最大连接数（负数表示没有限制）
spring.redis.jedis.pool.max-active=20
# 连接池最大等待时间（负数表示没有限制）
spring.redis.jedis.pool.max-wait=1000000ms
# 连接池中的最大空闲连接
spring.redis.jedis.pool.max-idle=10
# 连接池中的最小空闲连接
spring.redis.jedis.pool.min-idle=0
# 连接超时时间（毫秒）
spring.redis.timeout= 2000ms
# redis配置
# 消息处理 可选 rabbitmq 或 redis
messaging.handle.channel=redis
#rabbitmq配置
rabbitmq.host=localhost
rabbitmq.port=5672
#项目目录
project.folder=d:/webser/web_app/easymeeting/

# MinIO配置
minio.endpoint=http://127.0.0.1:9000
minio.access-key=admin
minio.secret-key=Minio@123456
minio.bucket-name=meetingavatar

#日志级别配置
#默认debug
log.root.level=debug

#超级管理员id
admin.emails=test@qq.com

#MyBatis配置
# Mapper XML文件位置
mybatis.mapper-locations=classpath:com/easymeeting/mappers/*.xml
# 别名配置
mybatis.type-aliases-package=com.easymeeting.entity.po
# 启用大小写映射
mybatis.configuration.map-underscore-to-camel-case=true

