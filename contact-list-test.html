<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系人列表功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .container { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .log { background: #000; color: #0f0; padding: 15px; border-radius: 4px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        button.success { background: #28a745; }
        button.success:hover { background: #218838; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin: 5px; width: 300px; }
        .result { background: white; padding: 15px; border-radius: 4px; border: 1px solid #ddd; margin: 10px 0; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        .contact-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .contact-item { 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            transition: box-shadow 0.2s;
        }
        .contact-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: #e9ecef; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            color: #6c757d;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .contact-id { color: #6c757d; font-size: 12px; margin-bottom: 5px; }
        .contact-status { font-size: 12px; }
        
        .status-online { color: #28a745; }
        .status-offline { color: #dc3545; }
        .status-indicator { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 5px; 
        }
        .status-indicator.online { background: #28a745; }
        .status-indicator.offline { background: #dc3545; }
        
        .login-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .login-panel { flex: 1; border: 1px solid #ddd; padding: 15px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>联系人列表功能测试</h1>
    
    <div class="login-section">
        <div class="login-panel">
            <h3>👤 用户登录</h3>
            <input type="email" id="email" placeholder="邮箱" value="2836240651@qq.com">
            <input type="password" id="password" placeholder="密码" value="123456">
            <div style="display: flex; gap: 10px; align-items: center; margin: 5px 0;">
                <input type="text" id="checkCode" placeholder="验证码" style="width: 150px;">
                <button onclick="getCheckCode()">获取验证码</button>
            </div>
            <button onclick="loginUser()">登录</button>
            <div id="loginStatus">未登录</div>
        </div>
    </div>

    <div class="container">
        <h3>联系人列表功能</h3>
        <button onclick="loadContactList()">加载联系人列表</button>
        <button onclick="testOnlineStatus()">测试在线状态判断</button>
        <div id="contactListResult" class="result">等待加载...</div>
    </div>

    <div class="container">
        <h3>调试日志</h3>
        <button onclick="clearLog()">清空日志</button>
        <div id="log" class="log"></div>
    </div>

    <script>
        let userToken = null;
        let userInfo = null;
        let checkCodeKey = null;

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function getCheckCode() {
            try {
                log('获取验证码...');
                const response = await fetch('http://localhost:6099/api/account/checkCode', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    checkCodeKey = result.data.checkCodeKey;
                    const checkCodeImage = result.data.checkCode;
                    
                    log('✅ 验证码获取成功');
                    
                    // 创建图片显示验证码
                    const imgElement = document.createElement('img');
                    imgElement.src = 'data:image/png;base64,' + checkCodeImage;
                    imgElement.style.border = '1px solid #ddd';
                    imgElement.style.marginLeft = '10px';
                    imgElement.id = 'checkCodeImage';
                    
                    // 移除旧的验证码图片
                    const oldImg = document.getElementById('checkCodeImage');
                    if (oldImg) oldImg.remove();
                    
                    // 添加新的验证码图片
                    document.getElementById('checkCode').parentNode.appendChild(imgElement);
                    
                    alert('验证码获取成功，请查看图片并输入验证码');
                } else {
                    log('❌ 验证码获取失败: ' + result.info);
                    alert('验证码获取失败: ' + result.info);
                }
            } catch (error) {
                log(`🚨 验证码获取失败: ${error.message}`);
                alert('验证码获取失败: ' + error.message);
            }
        }

        async function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const checkCode = document.getElementById('checkCode').value.trim();
            
            if (!checkCode) {
                alert('请先获取并输入验证码');
                return;
            }
            
            if (!checkCodeKey) {
                alert('请先获取验证码');
                return;
            }
            
            try {
                log('开始登录...');
                const response = await fetch('http://localhost:6099/api/account/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        checkCode,
                        checkCodeKey: checkCodeKey
                    })
                });

                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    log('✅ 登录成功');
                    userToken = result.data.token;
                    userInfo = result.data;
                    document.getElementById('loginStatus').textContent = '已登录: ' + userInfo.nickName + ' (ID: ' + userInfo.userId + ')';
                    document.getElementById('loginStatus').style.color = 'green';
                } else {
                    log(`❌ 登录失败: ${result.info}`);
                    document.getElementById('loginStatus').textContent = '登录失败: ' + result.info;
                    document.getElementById('loginStatus').style.color = 'red';
                }
            } catch (error) {
                log(`🚨 登录请求失败: ${error.message}`);
                document.getElementById('loginStatus').textContent = '登录失败: ' + error.message;
                document.getElementById('loginStatus').style.color = 'red';
            }
        }

        async function loadContactList() {
            if (!userToken) {
                alert('请先登录');
                return;
            }

            try {
                log('加载联系人列表...');
                const response = await fetch('http://localhost:6099/api/userContact/loadContactUser', {
                    method: 'GET',
                    headers: { 'token': userToken }
                });

                const result = await response.json();
                const resultDiv = document.getElementById('contactListResult');
                
                if (result.status === 'success') {
                    const contacts = result.data || [];
                    log(`✅ 联系人列表加载成功: ${contacts.length} 个联系人`);
                    
                    let html = `
                        <h4>📋 联系人列表 (${contacts.length})</h4>
                        <div class="contact-list">
                    `;
                    
                    if (contacts.length > 0) {
                        contacts.forEach(contact => {
                            const isOnline = isUserOnline(contact.lastLoginTime, contact.lastOffTime);
                            const onlineStatus = isOnline ? 'online' : 'offline';
                            const onlineText = isOnline ? '在线' : '离线';
                            // 直接使用avatar字段（MinIO完整URL）
                            const avatarUrl = contact.avatar;
                            
                            html += `
                                <div class="contact-item">
                                    <div class="avatar">
                                        ${avatarUrl ? 
                                            `<img src="${avatarUrl}" alt="头像" onerror="this.style.display='none'; this.parentNode.innerHTML='${getAvatarPlaceholder(contact.nickName)}';">` : 
                                            getAvatarPlaceholder(contact.nickName)
                                        }
                                    </div>
                                    <div class="contact-info">
                                        <div class="contact-name">${contact.nickName || '未知用户'}</div>
                                        <div class="contact-id">ID: ${contact.contactId}</div>
                                        <div class="contact-status status-${onlineStatus}">
                                            <span class="status-indicator ${onlineStatus}"></span>
                                            ${onlineText}
                                            ${contact.lastLoginTime ? ` (最后登录: ${formatTime(contact.lastLoginTime)})` : ''}
                                            ${contact.lastOffTime ? ` (最后离线: ${formatTime(contact.lastOffTime)})` : ''}
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        html += '<div style="text-align: center; padding: 40px; color: #6c757d;">暂无联系人</div>';
                    }
                    
                    html += '</div>';
                    
                    resultDiv.innerHTML = html;
                    resultDiv.className = 'result success';
                    
                    // 输出详细的联系人数据到日志
                    contacts.forEach(contact => {
                        log(`联系人: ${contact.nickName} (${contact.contactId}) - 登录时间: ${contact.lastLoginTime}, 离线时间: ${contact.lastOffTime}, 头像: ${contact.avatar || '无'}`);
                    });
                    
                } else {
                    resultDiv.innerHTML = `<h4>❌ 加载失败</h4><p>${result.info}</p>`;
                    resultDiv.className = 'result error';
                    log(`❌ 加载失败: ${result.info}`);
                }
            } catch (error) {
                log(`🚨 加载联系人列表失败: ${error.message}`);
                const resultDiv = document.getElementById('contactListResult');
                resultDiv.innerHTML = `<h4>❌ 请求失败</h4><p>${error.message}</p>`;
                resultDiv.className = 'result error';
            }
        }

        function isUserOnline(lastLoginTime, lastOffTime) {
            // 如果没有登录时间，肯定是离线
            if (!lastLoginTime) return false;
            
            // 如果没有离线时间，说明从未离线过，如果有登录时间就是在线
            if (!lastOffTime) return true;
            
            // 比较最后登录时间和最后离线时间
            return lastLoginTime > lastOffTime;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '未知';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        function getAvatarPlaceholder(nickName) {
            // 获取昵称的第一个字符作为头像占位符
            const firstChar = nickName ? nickName.charAt(0).toUpperCase() : '?';
            return firstChar;
        }

        function testOnlineStatus() {
            log('测试在线状态判断逻辑...');
            
            const testCases = [
                { lastLoginTime: 1000, lastOffTime: 500, expected: true, desc: '登录时间晚于离线时间' },
                { lastLoginTime: 500, lastOffTime: 1000, expected: false, desc: '登录时间早于离线时间' },
                { lastLoginTime: 1000, lastOffTime: null, expected: true, desc: '有登录时间，无离线时间' },
                { lastLoginTime: null, lastOffTime: 1000, expected: false, desc: '无登录时间，有离线时间' },
                { lastLoginTime: null, lastOffTime: null, expected: false, desc: '无登录时间，无离线时间' }
            ];
            
            testCases.forEach((testCase, index) => {
                const result = isUserOnline(testCase.lastLoginTime, testCase.lastOffTime);
                const status = result === testCase.expected ? '✅' : '❌';
                log(`${status} 测试${index + 1}: ${testCase.desc} - 期望: ${testCase.expected}, 实际: ${result}`);
            });
            
            log('在线状态判断测试完成');
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        window.onload = function() {
            log('联系人列表功能测试工具已加载');
            log('使用步骤：');
            log('1. 获取验证码并登录');
            log('2. 点击"加载联系人列表"查看联系人');
            log('3. 查看在线状态和头像显示');
        };
    </script>
</body>
</html>
